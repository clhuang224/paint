<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/main.css">
    <title>Paint</title>
</head>
<body>
    <div
        class="app"
        x-data="paintApp()"
    >
        <header>
            <button class="export" @click="exportImage()">Export</button>
            <button class="clear" @click="clearCanvas()">Clear</button>
            <button
              class="undo"
              @click="undoAction()"
              :disabled="!$store.history.canUndo()"
            >Undo</button>
            <button
              class="redo"
              @click="redoAction()"
              :disabled="!$store.history.canRedo()"
            >Redo</button>
        </header>
        <main>
            <canvas
                x-ref="canvas"
                @pointerdown="startDrawing($event)"
                @pointermove="draw($event)"
                @pointerup="stopDrawing()"
                @pointerleave="stopDrawing()"
            ></canvas>
        </main>
        <footer>
            <input
                x-model.number="$store.brush.size"
                type="range"
                :min="$store.brush.MIN_SIZE"
                :max="$store.brush.MAX_SIZE"
            >
            <input
                x-model="$store.brush.color"
                type="color"
            >
        </footer>
    </div>
    <script type="module" src="./index.ts"></script>
</body>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./main.css">
    <title>Paint</title>
</head>
<body>
    <div
        class="app"
        x-data="paintApp()"
    >
        <header>
            <button class="export" @click="exportImage()">Export</button>
            <button class="clear" @click="clearCanvas()">Clear</button>
            <button class="undo" @click="undoAction()">Undo</button>
            <button class="redo" @click="redoAction()">Redo</button>
        </header>
        <main>
            <canvas
                @pointerdown="startDrawing($event)"
                @pointermove="draw($event)"
                @pointerup="stopDrawing()"
                @pointerleave="stopDrawing()"
            ></canvas>
        </main>
        <footer>
            <input
                x-model="size"
                type="range"
                min="1"
                max="50"
            >
            <input
                x-model="color"
                type="color"
            >
        </footer>
    </div>
    <script type="module" src="./main.js"></script>
</body>
